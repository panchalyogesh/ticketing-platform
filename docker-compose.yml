services:
  postgres:
    image: postgres:16-alpine
    container_name: ticketing-postgres
    environment:
      POSTGRES_DB: ticketing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ticketing"]
      interval: 5s
      timeout: 5s
      retries: 15

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ticketing-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ticketing
      PORT: 3001
      NODE_ENV: production
      ADMIN_API_KEY: dev-admin-key
      PRICE_TIME_WEIGHT: 1
      PRICE_DEMAND_WEIGHT: 1
      PRICE_INVENTORY_WEIGHT: 1
    ports:
      - "3001:3001"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3001/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: ticketing-web
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_BASE_URL: http://api:3001
    ports:
      - "3000:3000"

volumes:
  pgdata:
